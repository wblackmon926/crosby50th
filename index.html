<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFCE34">
  <title>Robert & Marilyn Crosby — 50th Wedding Anniversary</title>
  <style>
    :root {
      --gold: #FFCE34;
      --gold-dark: #8b5b00;
      --ink: #2d220f;
      --cream: #f7edd8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--cream);
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      color: var(--ink);
    }
    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 10px 10px 28px;
    }
    .invite {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 16px;
      background: #fff9ec;
      box-shadow: 0 10px 30px rgba(78, 51, 0, .28);
    }
    .invite img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Real visible buttons placed over the invitation artwork */
    .action {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 8px;
      border: 1px solid rgba(112, 69, 0, .45);
      border-radius: 9px;
      background:
        linear-gradient(180deg, #ffe47f 0%, var(--gold) 42%, #e7a900 100%);
      color: #2c210c;
      font-size: clamp(10px, 2.3vw, 17px);
      font-weight: 900;
      letter-spacing: .02em;
      text-decoration: none;
      text-align: center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.8),
        0 3px 7px rgba(70, 40, 0, .28);
      transition: transform .12s ease, box-shadow .12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .action:hover {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.9),
        0 5px 11px rgba(70, 40, 0, .35);
    }
    .action:active {
      transform: translateY(2px) scale(.99);
      box-shadow:
        inset 0 1px 2px rgba(90, 55, 0, .24),
        0 1px 4px rgba(70, 40, 0, .22);
    }
    .action:focus-visible {
      outline: 4px solid #1267d6;
      outline-offset: 2px;
    }

    .rsvp {
      left: 17.5%;
      top: 58.75%;
      width: 31.7%;
      height: 3.45%;
    }
    .directions {
      left: 51.0%;
      top: 58.75%;
      width: 31.8%;
      height: 3.45%;
    }
    .hotel {
      left: 56.5%;
      top: 76.0%;
      width: 27.4%;
      height: 3.2%;
    }

    /* Clickable venue and phone number, without changing the artwork */
    .venue-link,
    .phone-link {
      position: absolute;
      display: block;
      border-radius: 8px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .venue-link {
      left: 18%;
      top: 38.0%;
      width: 64%;
      height: 6.6%;
    }
    .phone-link {
      left: 54%;
      top: 83.0%;
      width: 31%;
      height: 4.8%;
    }
    .venue-link:focus-visible,
    .phone-link:focus-visible {
      outline: 4px solid #1267d6;
      outline-offset: 2px;
    }

    .hint {
      margin: 14px auto 0;
      max-width: 620px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.72);
      color: #5b451e;
      text-align: center;
      font-size: 14px;
      line-height: 1.45;
      box-shadow: 0 3px 10px rgba(70,45,0,.12);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="invite" aria-label="Robert and Marilyn Crosby 50th Wedding Anniversary invitation">

      <img
        src="invitation.png"
        alt="Robert and Marilyn Crosby 50th Wedding Anniversary invitation for Saturday, October 10, 2026 at 7:00 PM at LeBossier Hotel and Event Center in Bossier City, Louisiana."
      >

      <a class="action rsvp"
         href="https://calendarlink.com/event/oX5Ho"
         target="_blank"
         rel="noopener"
         aria-label="RSVP now">
        RSVP NOW
      </a>

      <a class="action directions"
         href="https://maps.app.goo.gl/L7eZCnwKiwYG5UAM8?g_st=ac"
         target="_blank"
         rel="noopener"
         aria-label="Get directions to LeBossier Hotel and Event Center">
        GET DIRECTIONS
      </a>

      <a class="action hotel"
         href="https://group.hamptoninn.com/feu3qz"
         target="_blank"
         rel="noopener"
         aria-label="Book Hampton Inn hotel">
        BOOK HOTEL
      </a>

      <a class="venue-link"
         href="https://maps.app.goo.gl/L7eZCnwKiwYG5UAM8?g_st=ac"
         target="_blank"
         rel="noopener"
         aria-label="Open venue address in Google Maps"></a>

      <a class="phone-link"
         href="tel:+13187470711"
         aria-label="Call LeBossier Hotel at 318-747-0711"></a>
    </section>

    <p class="hint">
      The gold buttons are now real, tappable website buttons. The venue address opens Google Maps, and the LeBossier phone number can be tapped to call.
    </p>
  </main>
</body>
</html>
