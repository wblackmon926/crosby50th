<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFCE34">
  <title>Robert & Marilyn Crosby — 50th Wedding Anniversary</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #f7edd8;
    }
    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 8px;
    }
    .invitation {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(75, 48, 0, .22);
      background: #fff9ec;
    }
    .invitation img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Invisible links exactly over the printed buttons.
       They do not alter the invitation's fonts, colors, or layout. */
    .hotspot {
      position: absolute;
      display: block;
      cursor: pointer;
      border-radius: 10px;
      -webkit-tap-highlight-color: rgba(255, 206, 52, .25);
    }
    .hotspot:focus-visible {
      outline: 4px solid #1367d5;
      outline-offset: 2px;
    }

    .rsvp {
      left: 12.2%;
      top: 77.35%;
      width: 34.9%;
      height: 3.55%;
    }
    .directions {
      left: 50.0%;
      top: 77.35%;
      width: 35.7%;
      height: 3.55%;
    }
    .hotel {
      left: 14.8%;
      top: 87.28%;
      width: 22.8%;
      height: 2.75%;
    }

    /* Additional useful tap targets */
    .venue {
      left: 10.3%;
      top: 47.0%;
      width: 43.0%;
      height: 5.7%;
    }
    .phone {
      left: 58.0%;
      top: 85.1%;
      width: 25.0%;
      height: 3.2%;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="invitation" aria-label="Robert and Marilyn Crosby 50th Wedding Anniversary invitation">
      <img src="robert-marilyn-50th.png"
           alt="Robert and Marilyn Crosby 50th Wedding Anniversary invitation for Saturday, October 10, 2026 at 7:00 PM at LeBossier Hotel and Event Center in Bossier City, Louisiana.">

      <a class="hotspot rsvp"
         href="https://calendarlink.com/event/oX5Ho"
         target="_blank" rel="noopener"
         aria-label="RSVP now" title="RSVP now"></a>

      <a class="hotspot directions"
         href="https://maps.app.goo.gl/L7eZCnwKiwYG5UAM8?g_st=ac"
         target="_blank" rel="noopener"
         aria-label="Get directions" title="Get directions"></a>

      <a class="hotspot hotel"
         href="https://group.hamptoninn.com/feu3qz"
         target="_blank" rel="noopener"
         aria-label="Book Hampton Inn hotel" title="Book hotel"></a>

      <a class="hotspot venue"
         href="https://maps.app.goo.gl/L7eZCnwKiwYG5UAM8?g_st=ac"
         target="_blank" rel="noopener"
         aria-label="Open venue in Google Maps" title="Open venue in Google Maps"></a>

      <a class="hotspot phone"
         href="tel:+13187470711"
         aria-label="Call LeBossier Hotel at 318-747-0711"
         title="Call LeBossier Hotel"></a>
    </section>
  </main>
</body>
</html>
