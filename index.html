<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robert & Marilyn Crosby - 50th Anniversary</title>
  <style>
    body {
      margin: 0;
      background: #f5ecd8;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .container {
      max-width: 760px;
      margin: auto;
      padding: 10px;
    }
    .invitation {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
    }
    .buttons {
      padding: 16px 4px 28px;
    }
    .button {
      display: block;
      margin: 12px 0;
      padding: 18px;
      background: linear-gradient(#c99221, #986000);
      color: white;
      text-decoration: none;
      font-size: 22px;
      font-weight: bold;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,.25);
    }
    .note {
      color: #5b4217;
      font-size: 15px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="invitation.png"
         alt="Robert and Marilyn Crosby 50th Wedding Anniversary Invitation"
         class="invitation">

    <div class="buttons">
      <a class="button"
         href="https://calendarlink.com/event/oX5Ho"
         target="_blank" rel="noopener">
        RSVP NOW
      </a>

      <a class="button"
         href="https://group.hamptoninn.com/feu3qz"
         target="_blank" rel="noopener">
        BOOK HOTEL
      </a>

      <a class="button"
         href="https://www.google.com/maps/search/?api=1&query=LeBossier+Hotel+and+Event+Center+4000+LA-782-2+Bossier+City+LA+71112"
         target="_blank" rel="noopener">
        GET DIRECTIONS
      </a>

      <p class="note">Tap a button above. No PDF app or download is required.</p>
    </div>
  </div>
</body>
</html>
