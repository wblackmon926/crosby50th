<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFCE34">
  <title>Robert & Marilyn Crosby — 50th Wedding Anniversary</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f4ead5; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: #3a2b15;
    }
    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 10px 10px 28px;
    }
    .invitation-wrap {
      position: relative;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(70, 45, 0, .28);
      background: #fff8e8;
    }
    .invitation {
      display: block;
      width: 100%;
      height: auto;
    }
    .hotspot {
      position: absolute;
      display: block;
      border-radius: 10px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .hotspot:focus-visible {
      outline: 4px solid #1a73e8;
      outline-offset: 2px;
    }

    /* Clickable areas aligned to the visible buttons in the invitation artwork */
    .rsvp {
      left: 17.5%;
      top: 58.9%;
      width: 31.5%;
      height: 3.4%;
    }
    .directions {
      left: 51.2%;
      top: 58.9%;
      width: 31.7%;
      height: 3.4%;
    }
    .hotel {
      left: 56.7%;
      top: 76.1%;
      width: 27.0%;
      height: 3.1%;
    }

    .fallback {
      padding: 18px 8px 4px;
      text-align: center;
    }
    .fallback p {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.4;
    }
    .fallback-links {
      display: grid;
      gap: 10px;
    }
    .fallback-links a {
      display: block;
      padding: 15px 16px;
      border-radius: 12px;
      background: #FFCE34;
      color: #2e2108;
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(93, 64, 0, .18);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="invitation-wrap" aria-label="Robert and Marilyn Crosby 50th Wedding Anniversary invitation">
      <img class="invitation" src="invitation.png"
           alt="Robert and Marilyn Crosby 50th Wedding Anniversary invitation for Saturday, October 10, 2026 at 7:00 PM at LeBossier Hotel and Event Center.">

      <a class="hotspot rsvp" href="https://calendarlink.com/event/oX5Ho" target="_blank" rel="noopener"
         aria-label="RSVP now"></a>

      <a class="hotspot directions" href="https://maps.app.goo.gl/L7eZCnwKiwYG5UAM8?g_st=ac" target="_blank" rel="noopener"
         aria-label="Get directions"></a>

      <a class="hotspot hotel" href="https://group.hamptoninn.com/feu3qz" target="_blank" rel="noopener"
         aria-label="Book Hampton Inn hotel"></a>
    </section>

    <section class="fallback">
      <p>The gold buttons inside the invitation are clickable. These backup buttons work too:</p>
      <div class="fallback-links">
        <a href="https://calendarlink.com/event/oX5Ho" target="_blank" rel="noopener">RSVP NOW</a>
        <a href="https://group.hamptoninn.com/feu3qz" target="_blank" rel="noopener">BOOK HOTEL</a>
        <a href="https://maps.app.goo.gl/L7eZCnwKiwYG5UAM8?g_st=ac" target="_blank" rel="noopener">GET DIRECTIONS</a>
      </div>
    </section>
  </main>
</body>
</html>
