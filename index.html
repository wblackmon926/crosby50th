<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFCE34">
  <title>Robert & Marilyn Crosby — 50th Wedding Anniversary</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: #f7edd8;
    }
    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
    }
    .page {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 8px;
    }
    .invitation {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(75, 48, 0, .22);
      background: #fff9ec;
    }
    .invitation img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Invisible links exactly over the printed buttons.
       They do not alter the invitation's fonts, colors, or layout. */
    .hotspot {
      position: absolute;
      display: block;
      cursor: pointer;
      border-radius: 10px;
      -webkit-tap-highlight-color: rgba(255, 206, 52, .25);
    }
    .hotspot:focus-visible {
      outline: 4px solid #1367d5;
      outline-offset: 2px;
    }

    .rsvp {
  left: 14.3%;
  top: 85.45%;
  width: 34.0%;
  height: 3.1%;
}

.directions {
  left: 51.8%;
  top: 85.45%;
  width: 34.7%;
  height: 3.1%;
}

.hotel {
  left: 18.0%;
  top: 94.2%;
  width: 18.0%;
  height: 2.5%;
}

    /* Additional useful tap targets */
   
  </style>
</head>
<body>
  <main class="page">
    <section class="invitation" aria-label="Robert and Marilyn Crosby 50th Wedding Anniversary invitation">
      <img src="robert-marilyn-50th1.png"
           alt="Robert and Marilyn Crosby 50th Wedding Anniversary invitation for Saturday, October 10, 2026 at 7:00 PM at LeBossier Hotel and Event Center in Bossier City, Louisiana.">

      <a class="hotspot rsvp"
         href="https://calendarlink.com/event/oX5Ho"
         target="_blank" rel="noopener"
         aria-label="RSVP now" title="RSVP now"></a>

     <a class="hotspot directions"
   href="https://www.google.com/maps/dir/?api=1&destination=LeBossier+Hotel+%26+Event+Center%2C+4000+LA-782-2%2C+Bossier+City%2C+LA+71112"
   target="_blank" rel="noopener"
   aria-label="Get directions to LeBossier Hotel and Event Center"
   title="Get directions"></a>

      <a class="hotspot hotel"
         href="https://group.hamptoninn.com/feu3qz"
         target="_blank" rel="noopener"
         aria-label="Book Hampton Inn hotel" title="Book hotel"></a>

    </section>
  </main>
</body>
</html>
